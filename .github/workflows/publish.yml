name: Build & Publish

on:
    workflow_dispatch:
    push:
        branches:
            - master
        paths:
            - 'src/main/kotlin/org/koitharu/kotatsu/parsers/**'

env:
    D8_PATH: build/libs/usagi-plugin.jar

permissions:
  contents: write

jobs:
    publish:
        runs-on: ubuntu-latest
        steps:
            -   name: Checkout repository 🌏
                uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231 # v6.0.2
                with:
                    fetch-depth: 0

            -   name: Fetch latest commit 🔖
                id: meta
                run: echo "sha_short=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

            -   name: Set up Java environment 🔧
                uses: actions/setup-java@b622de1dfa918ecc0ab28f40cd42e3c3752cd6c5 # v5.2.0
                with:
                    java-version: '21'
                    distribution: 'temurin'

            -   name: Set up Gradle environment 📦
                uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
                with:
                    gradle-version: '9.3.1'

            -   name: Setup Android SDK 🚀
                uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1

            -   name: Run assemble tasks 🚀
                run: ./gradlew assemble copyDependencies --rerun-tasks

            -   name: Process library with d8 🚀
                env:
                    LIB_PATH: build/libs/kotatsu-parsers.jar
                run: |
                    ## Dex classes after build...
                    if [ -f ${{ env.LIB_PATH }} ]; then
                        ANDROID_JAR=$(find $ANDROID_HOME/platforms -name "android.jar" | sort -V | tail -n 1)
                        d8 --release ${{ env.LIB_PATH }} --output ${{ env.D8_PATH }} --lib "$ANDROID_JAR" $(find build/dependencies -name "*.jar" | sed 's/^/--lib /')
                    else
                        echo "ℹ️ Pre-compiled library not found, skipping D8 step..."
                    fi
                continue-on-error: true

            -   name: Upload artifacts 🌐
                uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
                with:
                    # repository: mochi-plugins/repository
                    tag_name: ${{ steps.meta.outputs.sha_short }}
                    name: ${{ steps.meta.outputs.sha_short }}
                    body: |
                        Built from commit [`${{ steps.meta.outputs.sha_short }}`](https://github.com/AhmadNaruto/kotatsu-parsers/commit/${{ github.sha }})
                    files: ${{ env.D8_PATH }}
                    token: ${{ secrets.GITHUB_TOKEN }}
